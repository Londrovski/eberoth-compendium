<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eberoth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="grain"></div>

  <header>
    <div class="header-bg"></div>
    <div class="header-inner">
      <div class="header-rule"></div>
      <h1>Eberoth</h1>
      <div class="header-rule"></div>
    </div>
  </header>

  <nav>
    <div class="nav-inner">
      <button class="nav-btn active" data-section="party">The Party</button>
      <div class="nav-sep">✦</div>
      <button class="nav-btn" data-section="factions">Houses &amp; Factions</button>
      <div class="nav-sep">✦</div>
      <button class="nav-btn" data-section="notes">Notes</button>
      <div class="nav-sep">✦</div>
      <button class="nav-btn" data-section="sessions">Session Log</button>
    </div>
  </nav>

  <main>

    <!-- PARTY -->
    <section id="section-party" class="section active">
      <div class="party-grid" id="party-grid"></div>
    </section>

    <!-- FACTIONS -->
    <section id="section-factions" class="section">
      <div id="crown-slot"></div>
      <div class="hierarchy-divider">
        <span>The Houses</span>
      </div>
      <div class="cards-grid" id="factions-grid"></div>
    </section>

    <!-- NOTES -->
    <section id="section-notes" class="section">

      <!-- SHARED LORE CARDS -->
      <div class="section-header">
        <h2>Party Notes</h2>
        <p>What the group knows. Shared by the GM.</p>
      </div>
      <div id="shared-lore-cards" class="comp-cards-grid"></div>
      <div id="party-notes-list" class="notes-wrap" style="margin-top:1.5rem;"></div>

      <!-- PERSONAL COMPENDIUM -->
      <div class="personal-notes-block">
        <div class="hierarchy-divider" style="margin: 3rem 0 2rem;">
          <span>Personal</span>
        </div>
        <div class="section-header" style="border:none; margin-bottom:1.5rem; padding-bottom:0;">
          <p>Enter your passphrase to read your private notes.</p>
        </div>

        <div id="passphrase-form" class="passphrase-form">
          <input id="passphrase-input"
                 type="text"
                 placeholder="Passphrase"
                 maxlength="30"
                 autocomplete="off"
                 autocorrect="off"
                 autocapitalize="off"
                 spellcheck="false"
                 data-form-type="other"
                 data-lpignore="true"
                 data-1p-ignore="true" />
          <button id="passphrase-submit">Unlock</button>
        </div>

        <div id="personal-notes-reveal" class="hidden">
          <div id="personal-notes-header" class="personal-notes-header"></div>
          <div id="personal-compendium" class="comp-cards-grid"></div>
          <div id="personal-notes-list" class="notes-wrap" style="margin-top:2rem;"></div>
          <button id="passphrase-lock" class="lock-btn">Lock</button>
        </div>
      </div>

    </section>

    <!-- SESSIONS -->
    <section id="section-sessions" class="section">
      <div class="section-header">
        <h2>Session Log</h2>
        <p>A record of what has passed.</p>
      </div>
      <div id="sessions-list"></div>
    </section>

  </main>

  <!-- DETAIL OVERLAY -->
  <div id="overlay" class="overlay hidden">
    <div class="detail-panel">
      <button id="close-overlay" class="close-btn">✕</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- ===========================
       DATA LOAD ORDER
       Leaf files first, then assembly, then app.
       See README.md for architecture.
       =========================== -->

  <!-- Factions -->
  <script src="data/factions/crown.js"></script>
  <script src="data/factions/corvath.js"></script>
  <script src="data/factions/voss.js"></script>
  <script src="data/factions/gorrund.js"></script>
  <script src="data/factions/halvorn.js"></script>

  <!-- Players -->
  <script src="data/players/kalvorn.js"></script>
  <script src="data/players/azrael.js"></script>
  <script src="data/players/dirk.js"></script>

  <!-- Shared lore -->
  <script src="data/lore/stillmarks.js"></script>
  <script src="data/lore/tessaly.js"></script>
  <script src="data/lore/daven-halvorn.js"></script>
  <script src="data/lore/jorik.js"></script>
  <script src="data/lore/byren-holt.js"></script>
  <script src="data/lore/mael-dross.js"></script>
  <script src="data/lore/brotherhood-of-the-patient-dawn.js"></script>

  <!-- Sessions -->
  <script src="data/sessions/session-1.js"></script>
  <script src="data/sessions/session-2.js"></script>
  <script src="data/sessions/session-3.js"></script>
  <script src="data/sessions/session-4.js"></script>

  <!-- Personal: Kalvorn -->
  <script src="data/personal/kalvorn/meta.js"></script>
  <script src="data/personal/kalvorn/compendium/aldus-corvath.js"></script>
  <script src="data/personal/kalvorn/compendium/byren-holt.js"></script>
  <script src="data/personal/kalvorn/compendium/maltheus.js"></script>
  <script src="data/personal/kalvorn/notes/something-to-consider.js"></script>
  <script src="data/personal/kalvorn/_index.js"></script>

  <!-- Personal: Azrael -->
  <script src="data/personal/azrael/meta.js"></script>
  <script src="data/personal/azrael/compendium/cadriel.js"></script>
  <script src="data/personal/azrael/compendium/sylvia.js"></script>
  <script src="data/personal/azrael/compendium/descending-horizon.js"></script>
  <script src="data/personal/azrael/_index.js"></script>

  <!-- Personal: Dirk -->
  <script src="data/personal/dirk/meta.js"></script>
  <script src="data/personal/dirk/compendium/aldus-corvath.js"></script>
  <script src="data/personal/dirk/compendium/the-teacher.js"></script>
  <script src="data/personal/dirk/notes/the-arm.js"></script>
  <script src="data/personal/dirk/_index.js"></script>

  <!-- Top-level assembly -->
  <script src="data.js"></script>

  <!-- App renderer -->
  <script src="app.js"></script>

</body>
</html>
