<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eberoth — The Compendium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== LANDING ===== -->
  <div id="landing">
    <div class="landing-card">
      <div class="landing-rule"></div>
      <h1 class="landing-eberoth">Eberoth</h1>
      <div class="landing-compendium">The Compendium</div>
      <div class="landing-rule"></div>
      <p class="landing-tag">Enter your passphrase.</p>
      <input id="landingInput"
             type="text"
             placeholder="Passphrase"
             maxlength="30"
             autocomplete="off"
             autocorrect="off"
             autocapitalize="off"
             spellcheck="false"
             data-form-type="other"
             data-lpignore="true"
             data-1p-ignore="true" />
      <div class="landing-actions">
        <button id="landingSubmit">Enter</button>
        <button id="landingGuest" class="secondary">Guest</button>
      </div>
      <div id="landingError" class="landing-error"></div>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app" class="app" style="display:none;">
    <div class="topbar">
      <h1>The Compendium</h1>
      <nav class="nav">
        <button id="navHome">Home</button>
        <button id="navSessions">Sessions</button>
        <button id="navParty">Party</button>
      </nav>
      <button id="navMoveMode" class="move-mode-toggle" title="Toggle move mode">Move</button>
      <button id="navBlockMode" class="move-mode-toggle" style="display:none" title="DM-only: drag a whole cluster (Party/Personal, Crown & Houses, Lore, Title) as one. Saves as the new baseline for everyone.">Block Move</button>
      <button id="navPushToAll" class="push-to-all" style="display:none" title="DM-only: push your current layout to all players (overwrites theirs)">Push to Players</button>
      <button id="navSetHome" class="push-to-all" style="display:none" title="DM-only: save the current view as Home for everyone">Set Home</button>
      <!-- DM-only card label font size adjuster -->
      <button id="navFontDown" class="font-adj" style="display:none" title="Decrease map card label size">A−</button>
      <button id="navFontUp"   class="font-adj" style="display:none" title="Increase map card label size">A+</button>
      <div class="role-tag"><span id="roleBadge">…</span></div>
      <!-- DM-only quick-switch. Frontend-only preview. -->
      <select id="viewAsSelect" class="view-as-select" style="display:none" title="DM-only: preview the map as another player">
        <option value="">View as DM</option>
        <option value="baker">View as Baker (Kalvorn)</option>
        <option value="butcher">View as Butcher (Azrael)</option>
        <option value="charlie">View as Charlie (Dirk)</option>
        <option value="guest">View as Guest</option>
      </select>
      <button id="logout" class="logout-btn" title="Sign out">Lock</button>
    </div>

    <div class="body">

      <aside class="drawer" id="drawer">
        <section class="drawer-section threads">
          <div class="drawer-header">
            <span>Active Threads</span>
            <button id="addThread" title="Add thread">+</button>
          </div>
          <div class="threads-list" id="threadsList"></div>
        </section>
        <section class="drawer-section notes">
          <div class="drawer-header"><span>Notes</span></div>
          <div class="notes-tabs" id="notesTabs"></div>
          <div class="note-body-wrap">
            <div class="note-body" id="noteBody" contenteditable="true"></div>
            <div class="mention-dropdown" id="mentionDropdown"></div>
          </div>
        </section>
      </aside>

      <main class="main">
        <div class="map-wrap">
          <div class="map-stage">
            <div class="map-viewport" id="viewport">
              <div class="map-canvas-wrap" id="canvasWrap">
                <div class="map-canvas" id="canvas">
                  <svg id="lines"></svg>
                </div>
              </div>
            </div>
            <div class="map-controls">
              <button id="zoomIn" title="Zoom in">+</button>
              <button id="zoomOut" title="Zoom out">−</button>
              <button id="zoomReset" title="Home">⌂</button>
              <button id="layoutReset" title="Reset to baseline">↺</button>
            </div>
          </div>

          <aside class="detail" id="detail">
            <div class="detail-inner" id="detailInner"></div>
          </aside>
        </div>
      </main>

      <button class="drawer-toggle" id="drawerToggle">◀</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="loader.js"></script>
</body>
</html>
